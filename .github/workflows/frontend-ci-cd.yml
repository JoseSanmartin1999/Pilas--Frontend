name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Build, Test and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # Checkout del repositorio
      # ==========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================
      # Notificación de inicio
      # ==========================
      - name: Notify Telegram - Pipeline Started
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_TO" \
          -d text="🚀 CI/CD PIPELINE INICIADO

          📦 Proyecto: Frontend Pilas
          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          Se ejecutarán:
          ✅ Instalación
          ✅ Pruebas
          ✅ SonarCloud
          ✅ Build
          ✅ Deploy"

      # ==========================
      # Configuración de Node
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ==========================
      # Instalación
      # ==========================
      - name: Install dependencies
        run: npm ci

      # ==========================
      # Pruebas
      # ==========================
      - name: Run Tests
        run: npm test

      # ==========================
      # Lint
      # ==========================
      - name: Run ESLint
        run: npm run lint

      # ==========================
      # SonarCloud
      # ==========================
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=JoseSanmartin1999_Pilas--Frontend
            -Dsonar.organization=josesanmartin1999
            -Dsonar.sources=src
            -Dsonar.host.url=https://sonarcloud.io

      # ==========================
      # Quality Gate
      # ==========================
      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ==========================
      # Build
      # ==========================
      - name: Build application
        run: npm run build

      # ==========================
      # Guardar artefacto
      # ==========================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist

      # ==========================
      # Instalar Vercel CLI
      # ==========================
      - name: Install Vercel CLI
        run: npm install -g vercel

      # ==========================
      # Vincular proyecto
      # ==========================
      - name: Pull Vercel Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull \
          --yes \
          --environment=production \
          --token="$VERCEL_TOKEN"

      # ==========================
      # Build Vercel
      # ==========================
      - name: Build Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel build \
          --prod \
          --token="$VERCEL_TOKEN"

      # ==========================
      # Deploy
      # ==========================
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy \
          --prebuilt \
          --prod \
          --token="$VERCEL_TOKEN")

          echo "deployment_url=$url" >> $GITHUB_OUTPUT

      # ==========================
      # Notificación éxito
      # ==========================
      - name: Notify Telegram Success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_TO" \
          -d text="✅ PIPELINE COMPLETADO

          📦 Proyecto: Frontend Pilas

          ✔ Dependencias instaladas
          ✔ Pruebas superadas
          ✔ SonarCloud aprobado
          ✔ Build generado
          ✔ Despliegue realizado

          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          🌐 Producción:
          ${{ steps.deploy.outputs.deployment_url }}

          🟢 Estado: EXITOSO"

      # ==========================
      # Notificación fallo
      # ==========================
      - name: Notify Telegram Failure
        if: failure() || cancelled()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_TO" \
          -d text="❌ PIPELINE DETENIDO o FALLIDO

          📦 Proyecto: Frontend Pilas

          El flujo no se completó debido a un error o fue cancelado.

          🔴 Estado del Job: ${{ job.status }}
          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          Revisa GitHub Actions para identificar la etapa exacta del fallo."