name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Build, Test and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # Checkout del repositorio
      # ==========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================
      # Notificación de inicio
      # ==========================
      - name: Notify Telegram - Pipeline Started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_TO }}" \
          -d text="🚀 CI/CD PIPELINE INICIADO

          📦 Proyecto: Frontend Pilas
          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          Se ejecutarán:
          ✅ Instalación
          ✅ Pruebas
          ✅ SonarCloud
          ✅ Build
          ✅ Deploy"

      # ==========================
      # Configuración de Node
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ==========================
      # Instalación
      # ==========================
      - name: Install dependencies
        run: npm ci

      # ==========================
      # Pruebas
      # ==========================
      - name: Run Tests
        run: npm test

      # ==========================
      # Lint
      # ==========================
      - name: Run ESLint
        run: npm run lint

      # ==========================
      # SonarCloud
      # ==========================
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=JoseSanmartin1999_Pilas--Frontend
            -Dsonar.organization=josesanmartin1999
            -Dsonar.sources=src
            -Dsonar.host.url=https://sonarcloud.io

      # ==========================
      # Quality Gate
      # ==========================
      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ==========================
      # Build
      # ==========================
      - name: Build application
        run: npm run build

      # ==========================
      # Guardar artefacto
      # ==========================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist

      # ==========================
      # Instalar Vercel CLI
      # ==========================
      - name: Install Vercel CLI
        run: npm install -g vercel

      # ==========================
      # Vincular proyecto
      # ==========================
      - name: Pull Vercel Environment
        run: |
          vercel pull \
          --yes \
          --environment=production \
          --token=${{ secrets.VERCEL_TOKEN }}

      # ==========================
      # Build Vercel
      # ==========================
      - name: Build Vercel
        run: |
          vercel build \
          --prod \
          --token=${{ secrets.VERCEL_TOKEN }}

      # ==========================
      # Deploy
      # ==========================
      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy \
          --prebuilt \
          --prod \
          --token=${{ secrets.VERCEL_TOKEN }})

          echo "deployment_url=$url" >> $GITHUB_OUTPUT

      # ==========================
      # Notificación éxito
      # ==========================
      - name: Notify Telegram Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_TO }}" \
          -d text="✅ PIPELINE COMPLETADO

          📦 Proyecto: Frontend Pilas

          ✔ Dependencias instaladas
          ✔ Pruebas superadas
          ✔ SonarCloud aprobado
          ✔ Build generado
          ✔ Despliegue realizado

          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          🌐 Producción:
          ${{ steps.deploy.outputs.deployment_url }}

          🟢 Estado: EXITOSO"

      # ==========================
      # Notificación fallo
      # ==========================
      - name: Notify Telegram Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_TO }}" \
          -d text="❌ PIPELINE FALLIDO

          📦 Proyecto: Frontend Pilas

          El flujo se detuvo por un error en alguna de las siguientes etapas:

          • Instalación de dependencias
          • Pruebas automatizadas
          • SonarCloud / Quality Gate
          • Build
          • Deploy

          🌿 Rama: ${{ github.ref_name }}
          👤 Usuario: ${{ github.actor }}

          Revisa GitHub Actions para identificar la etapa exacta del fallo."